name: Dominion Resources
description: >-
  Dominion Resources is the former name of Dominion Energy, one of the nation's
  largest producers and transporters of energy, providing electricity and
  natural gas to customers across multiple U.S. states. The company rebranded
  from Dominion Resources to Dominion Energy in 2017. No public developer APIs
  are currently published.
